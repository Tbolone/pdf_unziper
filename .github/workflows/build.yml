name: Build Windows EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kód letöltése
      uses: actions/checkout@v4
      
    - name: Python környezet beállítása
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Csomagok telepítése
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: EXE fordítása PyInstaller-rel
      run: pyinstaller --noconsole --onefile pdf_zipper.py
      
    - name: Kész EXE feltöltése
      uses: actions/upload-artifact@v4
      with:
        name: PDF_Zipper_Alkalmazas
        path: dist/pdf_zipper.exe

